name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20  # Matches Netlify build (Node 20); tighten back to 22 once Netlify upgrades
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Security audit
        # The only HIGH findings are ws/form-data pulled in transitively by
        # @irys/sdk (Arweave permanence). That code is dynamically imported and
        # gated behind ENABLE_ARWEAVE (off in production), so the vulns are not
        # reachable at runtime. Gate on 'critical' (currently zero) so CI isn't
        # blocked by unreachable highs. Tighten back to 'high' once a ws override
        # lands or @irys is removed/Arweave ships. See production audit 2026-06-18.
        run: npm audit --audit-level=critical
