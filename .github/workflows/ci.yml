name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20  # Matches Netlify build (Node 20); tighten back to 22 once Netlify upgrades
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Security audit
        # Gate on 'high' — confirmed clean (npm audit --audit-level=high exits 0 on 2026-06-28).
        # All current findings are moderate or low severity via @irys/sdk transitive deps
        # (dynamically imported, gated behind ENABLE_ARWEAVE, off in production).
        run: npm audit --audit-level=high
