name: Sync Parliament Data

# Manual dispatch only until a measured backfill confirms run time.
# After the first full backfill, uncomment the schedule block below
# and choose an interval based on the observed backfill duration.
# TODO: enable schedule after measuring backfill run time

on:
  workflow_dispatch:
    inputs:
      max_votes:
        description: 'Limit votes processed (for smoke tests). Leave blank for full sync.'
        required: false
        type: string
      dry_run:
        description: 'Dry run — fetch and map data but skip all DB writes. Safe for CI validation.'
        required: false
        type: boolean
        default: false

  # Uncomment after a measured backfill run to enable routine syncing.
  # Suggested: weekly on Monday at 05:00 UTC to catch weekend votes.
  # schedule:
  #   - cron: '0 5 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Safety ceiling; script's own DEADLINE_MS is 50m

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run parliament sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          MAX_ARG=""
          if [ -n "${{ github.event.inputs.max_votes }}" ]; then
            MAX_ARG="--max-votes=${{ github.event.inputs.max_votes }}"
          fi
          DRY_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_ARG="--dry-run"
          fi
          npx tsx scripts/sync-parliament-full.ts $MAX_ARG $DRY_ARG
