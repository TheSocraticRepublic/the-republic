<!-- The Peripatetic (Scout): Aristotle in motion — head tilted forward, scroll tucked under arm, garment trailing behind to suggest walking pace. Constructed from 6 geometric elements. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Head - circle, tilted forward -->
  <circle cx="280" cy="120" r="52" fill="#5BC88A"/>
  <!-- Neck/shoulder connection -->
  <rect x="260" y="168" width="36" height="32" fill="#5BC88A" transform="rotate(-8 278 184)"/>
  <!-- Torso - rectangle angled forward to suggest walking -->
  <rect x="230" y="195" width="80" height="160" rx="6" fill="#5BC88A" transform="rotate(-12 270 275)"/>
  <!-- Trailing garment - triangle behind suggesting motion -->
  <polygon points="235,350 195,380 260,380" fill="#5BC88A"/>
  <!-- Forward leg - angled rectangle -->
  <rect x="270" y="348" width="32" height="130" rx="4" fill="#5BC88A" transform="rotate(-15 286 413)"/>
  <!-- Back leg - angled rectangle -->
  <rect x="220" y="348" width="32" height="120" rx="4" fill="#5BC88A" transform="rotate(8 236 408)"/>
  <!-- Scroll under arm - small rectangle -->
  <rect x="310" y="240" width="50" height="14" rx="7" fill="#5BC88A" transform="rotate(-20 335 247)"/>
</svg>
