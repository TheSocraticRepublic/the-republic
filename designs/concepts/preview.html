<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 40px; display: flex; flex-wrap: wrap; gap: 40px; background: #111113; font-family: system-ui; }
.card { text-align: center; }
.card h3 { color: #fff; margin: 12px 0 4px; font-size: 14px; }
.sizes { display: flex; gap: 8px; align-items: flex-end; justify-content: center; }
.size { display: inline-flex; flex-direction: column; align-items: center; }
.size span { color: #666; font-size: 10px; margin-top: 4px; }
.dark { display: inline-block; padding: 12px; border-radius: 8px; background: #111113; border: 1px solid #333; }
.light { display: inline-block; padding: 12px; border-radius: 8px; background: #FAFAF9; border: 1px solid #ddd; }
</style>
</head>
<body>
<div class="card">
  <h3>Gadfly (Socrates) #C8A84B</h3>
  <div class="sizes">
    <div class="size"><div class="dark"><img src="silhouette-gadfly.svg" width="128" height="128"></div><span>128</span></div>
    <div class="size"><div class="light"><img src="silhouette-gadfly.svg" width="128" height="128"></div><span>128</span></div>
    <div class="size"><div class="dark"><img src="silhouette-gadfly.svg" width="48" height="48"></div><span>48</span></div>
    <div class="size"><div class="dark"><img src="silhouette-gadfly.svg" width="32" height="32"></div><span>32</span></div>
    <div class="size"><div class="dark"><img src="silhouette-gadfly.svg" width="20" height="20"></div><span>20</span></div>
  </div>
</div>
<div class="card">
  <h3>Peripatetic (Scout) #5BC88A</h3>

    <div class="size"><div class="dark"><img src="silhouette-peripatetic.svg" width="48" height="48"></div><span>48</span></div>
    <div class="size"><div class="dark"><img src="silhouette-peripatetic.svg" width="32" height="32"></div><span>32</span></div>
    <div class="size"><div class="dark"><img src="silhouette-peripatetic.svg" width="20" height="20"></div><span>20</span></div>
  </div>
</div>
<div class="card">
  <h3>Pythia (Oracle) #89B4C8</h3>

    <div class="size"><div class="light"><img src="silhouette-pythia.svg" width="128" height="128"></div><span>128</span></div>
    <div class="size"><div class="dark"><img src="silhouette-pythia.svg" width="48" height="48"></div><span>48</span></div>
    <div class="size"><div class="dark"><img src="silhouette-pythia.svg" width="32" height="32"></div><span>32</span></div>
    <div class="size"><div class="dark"><img src="silhouette-pythia.svg" width="20" height="20"></div><span>20</span></div>
  </div>
</div>
<div class="card">
  <h3>Herald (Lever) #C85B5B</h3>
  <div class="sizes">
    <div class="size"><div class="dark"><img src="silhouette-herald.svg" width="128" height="128"></div><span>128</span></div>
    <div class="size"><div class="light"><img src="silhouette-herald.svg" width="128" height="128"></div><span>128</span></div>

    <div class="size"><div class="dark"><img src="silhouette-herald.svg" width="20" height="20"></div><span>20</span></div>
  </div>

  <h3>Traveller (Mirror) #5BC88A</h3>
  <div class="sizes">
    <div class="size"><div class="dark"><img src="silhouette-traveller.svg" width="128" height="128"></div><span>128</span></div>

    <div class="size"><div class="dark"><img src="silhouette-traveller.svg" width="20" height="20"></div><span>20</span></div>

</body>
</html>
