<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Republic — Traced Cameo Profiles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; transition: background 0.3s, color 0.3s; }
    body.dark { background: #111113; color: #e8e6e3; }
    body.light { background: #FAFAF9; color: #1c1917; }
    .controls { position: sticky; top: 0; z-index: 10; padding: 16px 32px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid rgba(128,128,128,0.2); }
    body.dark .controls { background: #111113; }
    body.light .controls { background: #f5f4f3; }
    .toggle { padding: 6px 16px; border-radius: 4px; border: 1px solid rgba(128,128,128,0.3); cursor: pointer; font-size: 13px; background: transparent; }
    body.dark .toggle { color: #e8e6e3; }
    body.light .toggle { color: #1c1917; }
    .toggle.active { border-color: #C8A84B; background: rgba(200,168,75,0.1); }
    h1 { padding: 32px 32px 8px; font-weight: 300; font-size: 24px; letter-spacing: 1px; }
    h1 span { font-size: 14px; opacity: 0.5; display: block; margin-top: 4px; font-weight: 400; }
    .section { padding: 32px; border-bottom: 1px solid rgba(128,128,128,0.1); }
    .section h2 { font-weight: 400; font-size: 16px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
    .row { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; }
    .char { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .char-label { font-size: 11px; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; }
    .sizes { display: flex; align-items: flex-end; gap: 20px; }
    .sz { text-align: center; }
    .sz span { display: block; font-size: 9px; opacity: 0.3; margin-top: 3px; }
    .sz img { display: block; margin: 0 auto; }
  </style>
</head>
<body class="light">
  <div class="controls">
    <button class="toggle" onclick="setMode('dark')">Dark</button>
    <button class="toggle active" onclick="setMode('light')">Light</button>
  </div>
  <h1>Traced Cameo Profiles
    <span>Potrace-traced from AI-generated classical silhouettes. Genuine contour fidelity.</span>
  </h1>

  <div class="section">
    <h2>Final Set</h2>
    <div class="row">
      <div class="char">
        <div class="sizes">
          <div class="sz"><img src="final/peripatetic-cameo.svg" width="160" height="160"><span>160</span></div>
          <div class="sz"><img src="final/peripatetic-cameo.svg" width="64" height="64"><span>64</span></div>
          <div class="sz"><img src="final/peripatetic-cameo.svg" width="32" height="32"><span>32</span></div>
          <div class="sz"><img src="final/peripatetic-cameo.svg" width="16" height="16"><span>16</span></div>
        </div>
        <div class="char-label">Peripatetic (Scout)</div>
      </div>
      <div class="char">
        <div class="sizes">
          <div class="sz"><img src="final/pythia-cameo.svg" width="160" height="160"><span>160</span></div>
          <div class="sz"><img src="final/pythia-cameo.svg" width="64" height="64"><span>64</span></div>
          <div class="sz"><img src="final/pythia-cameo.svg" width="32" height="32"><span>32</span></div>
          <div class="sz"><img src="final/pythia-cameo.svg" width="16" height="16"><span>16</span></div>
        </div>
        <div class="char-label">Pythia (Oracle)</div>
      </div>
      <div class="char">
        <div class="sizes">
          <div class="sz"><img src="final/gadfly-cameo.svg" width="160" height="160"><span>160</span></div>
          <div class="sz"><img src="final/gadfly-cameo.svg" width="64" height="64"><span>64</span></div>
          <div class="sz"><img src="final/gadfly-cameo.svg" width="32" height="32"><span>32</span></div>
          <div class="sz"><img src="final/gadfly-cameo.svg" width="16" height="16"><span>16</span></div>
        </div>
        <div class="char-label">Gadfly (Gadfly)</div>
      </div>
      <div class="char">
        <div class="sizes">
          <div class="sz"><img src="final/herald-cameo.svg" width="160" height="160"><span>160</span></div>
          <div class="sz"><img src="final/herald-cameo.svg" width="64" height="64"><span>64</span></div>
          <div class="sz"><img src="final/herald-cameo.svg" width="32" height="32"><span>32</span></div>
          <div class="sz"><img src="final/herald-cameo.svg" width="16" height="16"><span>16</span></div>
        </div>
        <div class="char-label">Herald (Lever)</div>
      </div>
      <div class="char">
        <div class="sizes">
          <div class="sz"><img src="final/traveller-cameo.svg" width="160" height="160"><span>160</span></div>
          <div class="sz"><img src="final/traveller-cameo.svg" width="64" height="64"><span>64</span></div>
          <div class="sz"><img src="final/traveller-cameo.svg" width="32" height="32"><span>32</span></div>
          <div class="sz"><img src="final/traveller-cameo.svg" width="16" height="16"><span>16</span></div>
        </div>
        <div class="char-label">Traveller (Mirror)</div>
      </div>
    </div>
  </div>

  <script>
    function setMode(mode) {
      document.body.className = mode;
      document.querySelectorAll('.toggle').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
