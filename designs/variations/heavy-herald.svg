      <!-- Herald (Lever) — left-facing bust, heavy/bold.
           SQUARE JAW — angular, almost rectangular lower face.
           OPEN MOUTH — clear gap in the profile between upper and lower lip.
           Short helmet/cropped hair — flat on top.
           THICK neck, military build, broad powerful shoulders.
           The jaw and open mouth are the signature features.

           The open mouth is achieved by having upper lip curve back IN
           then lower lip/jaw jut back OUT — creating a visible gap. -->
